# =============================================================
# collect.yml — GitHub Actions Workflow
# Runs collect.py every hour and commits new data back to repo
# =============================================================

name: Hourly Hantavirus Data Collection

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Tell GitHub Actions it's allowed to write to this repo
permissions:
  contents: write

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data collection
        run: python scripts/collect.py

      - name: Commit new data to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/raw/*.csv logs/*.txt
          git diff --staged --quiet || git commit -m "Auto-collect: $(date +'%Y-%m-%d %H:%M') UTC"
          git push